services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: communityevents-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    image: communityevents-scraper:latest
    profiles:
      - scrape
    restart: "no"
    environment:
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PUPPETEER_DISABLE_SANDBOX: ${PUPPETEER_DISABLE_SANDBOX:-true}